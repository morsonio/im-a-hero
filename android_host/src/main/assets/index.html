<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Węzeł Zero - Terminal</title>
    <style>
        :root {
            --term-green: #0f0;
            --term-bg: #050505;
        }

        body {
            background-color: var(--term-bg);
            color: var(--term-green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }

        /* Efekt skanowania CRT (starego monitora) */
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        #output {
            flex-grow: 1;
            font-size: 1.2rem;
            line-height: 1.5;
            white-space: pre-wrap;
            text-shadow: 0 0 5px var(--term-green);
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.2rem;
            background-color: var(--term-green);
            animation: blink 1s step-end infinite;
            vertical-align: bottom;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        /* Styl przycisków wyboru (Bandersnatch) */
        #choices {
            display: none;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
            z-index: 10;
        }

        button {
            background: transparent;
            color: var(--term-green);
            border: 1px solid var(--term-green);
            padding: 15px;
            font-family: inherit;
            font-size: 1.1rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            text-shadow: 0 0 5px var(--term-green);
            box-shadow: 0 0 5px rgba(0, 255, 0, 0.2);
        }

        button:hover {
            background: var(--term-green);
            color: var(--term-bg);
            box-shadow: 0 0 15px var(--term-green);
        }

        /* Mikro-glitch podczas ładowania */
        .glitch-active {
            animation: shake 0.5s cubic-bezier(.36, .07, .19, .97) both;
            transform: translate3d(0, 0, 0);
        }

        @keyframes shake {

            10%,
            90% {
                transform: translate3d(-1px, 0, 0);
            }

            20%,
            80% {
                transform: translate3d(2px, 0, 0);
            }

            30%,
            50%,
            70% {
                transform: translate3d(-4px, 0, 0);
            }

            40%,
            60% {
                transform: translate3d(4px, 0, 0);
            }
        }
    </style>
    <script>

        document.addEventListener("DOMContentLoaded", () => {

            // Teraz mamy 100% pewności, że element 'prompt' fizycznie istnieje
            const promptElement = document.getElementById('prompt');

            if (promptElement) {
                const promptText = promptElement.innerText;
                // ... tutaj odpalasz resztę swojej matrixowej magii, terminala itp.
            } else {
                console.error("Błąd krytyczny: Brak elementu 'prompt' w HTML!");
            }

        });
    </script>
</head>

<body class="glitch-active">

    <div id="output"></div>
    <div id="choices">
        <button onclick="selectPath('CHAOS')">[ A ] "Kim ty w ogóle jesteś? Zaraz znajdę proces w tle i cię
            ubiję."</button>
        <button onclick="selectPath('LOGIC')">[ B ] "Zaintrygowałeś mnie. Pokaż mi swoją architekturę i
            zasady."</button>
        <button onclick="selectPath('SHADOW')">[ C ] "Oddawaj mojego YouTube'a, nie mam dzisiaj na to siły."</button>
    </div>
    <div style="display: flex; margin-top: 10px; font-size: 1.2rem; text-shadow: 0 0 5px var(--term-green);">
        <span id="prompt">root@node-zero:~#</span>
        <input type="text" id="user-input"
            style="flex-grow: 1; background: transparent; border: none; color: var(--term-green); font-family: 'Courier New', Courier, monospace; font-size: 1.2rem; outline: none; margin-left: 10px; text-shadow: 0 0 5px var(--term-green);"
            autocomplete="off" spellcheck="false" autofocus>
        <span class="cursor"></span>
    </div>
    <script>
        const output = document.getElementById('output');
        const input = document.getElementById('user-input');
        const promptText = document.getElementById('prompt').innerText;


        function processCommand(input) {
            if (input.trim().toLowerCase() === 'exit') {
                printToTerminal("Zrozumiałem. Zdejmuję blokadę układu nagrody...");
                // Dajemy sekundę na przeczytanie komunikatu i wysadzamy nakładkę
                setTimeout(() => {
                    if (window.AndroidBridge) {
                        window.AndroidBridge.closeTerminal();
                    } else {
                        console.log("Brak mostku Androida. Działam w przeglądarce PC?");
                    }
                }, 1000);
                return;
            }

            // ... reszta Twoich komend ...
        }
        // Maszyna stanów dla naszego Bandersnatcha
        let systemState = 'LOCKED'; // Dostępne: LOCKED, PROFILING, UNLOCKED

        document.body.addEventListener('click', () => input.focus());

        input.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                const command = this.value.trim().toLowerCase();
                if (command === '') return;

                appendOutput(`${promptText} ${command}`, '#0f0');
                this.value = '';
                processCommand(command);
            }
        });

        function appendOutput(text, color = '#0f0') {
            const line = document.createElement('div');
            line.style.color = color;
            line.style.marginTop = '5px';
            line.innerHTML = text.replace(/\n/g, '<br>');
            output.appendChild(line);
            output.scrollTop = output.scrollHeight;
        }

        function processCommand(cmd) {
            // 1. FAZA: BLOKADA (Zderzenie ze ścianą)
            if (systemState === 'LOCKED') {
                switch (cmd) {
                    case 'help':
                        appendOutput("DOSTĘPNE KOMENDY:\n- status : Pokaż stan systemu\n- init   : Uruchom protokół diagnostyczny", '#aaa');
                        break;
                    case 'status':
                        appendOutput("OSTRZEŻENIE: Wykryto próbę kradzieży czasu przez algorytmy z The Upside Down.\nUrządzenie zablokowane zapobiegawczo.", '#ff5555');
                        break;
                    case 'init':
                        appendOutput("URUCHAMIANIE DIAGNOSTYKI...\nOdpowiedz szczerze: jak reaguje Twój procesor w stresie?\nWpisz: 'freeze' (zamykam się), 'overheat' (wybucham) lub 'loop' (overthinking).", '#55ff55');
                        systemState = 'PROFILING';
                        break;
                    default:
                        appendOutput(`bash: ${cmd}: command not found. Wpisz 'help'.`, '#aaa');
                }
                return;
            }

            // 2. FAZA: PROFILOWANIE (Wybór Ścieżki)
            if (systemState === 'PROFILING') {
                if (['freeze', 'overheat', 'loop'].includes(cmd)) {
                    let avatar = "";
                    if (cmd === 'freeze') avatar = "DUCH (Omijanie ataków, kontrola)";
                    if (cmd === 'overheat') avatar = "BUNTOWNIK (Przekuwanie gniewu w akcję)";
                    if (cmd === 'loop') avatar = "ARCHITEKT (Budowanie logiki na błędach)";

                    appendOutput(`Zrozumiałem. Błąd to surowiec.\nKompilacja nowego awatara: [ ${avatar} ].\nMatryca zaktualizowana. Wpisz 'bypass', aby przejąć kontrolę nad urządzeniem.`, '#55ff55');
                    systemState = 'UNLOCKED';
                } else {
                    appendOutput("Nieprawidłowy parametr. Wpisz 'freeze', 'overheat' lub 'loop'.", '#ff5555');
                }
                return;
            }

            // 3. FAZA: ODBLOKOWANIE (Powrót do systemu)
            if (systemState === 'UNLOCKED') {
                if (cmd === 'bypass') {
                    appendOutput("BRAMY OTWARTE. Powodzenia, Jedenastko.", '#55ff55');
                    // Kontakt z Kotlinem przez mostek JNI!
                    if (window.AndroidBridge) {
                        setTimeout(() => window.AndroidBridge.closeTerminal(), 1500);
                    } else {
                        appendOutput("[BŁĄD MOSTKA: Środowisko testowe przeglądarki. W realnej apce to by się zamknęło.]", '#aaa');
                    }
                } else {
                    appendOutput("System oczekuje na komendę 'bypass'.", '#aaa');
                }
            }
        }

        // Sekwencja startowa
        setTimeout(() => {
            appendOutput("INICJALIZACJA WĘZŁA ZERO...\nSkanowanie biometryczne... Zgodność: OBIEKT 011.", '#aaa');
            appendOutput("Witaj. Odciąłem zasilanie od zabawek, które kradną Twój układ nagrody.\nWpisz 'help', aby rozpocząć.", '#0f0');
        }, 500);
    </script>
</body>

</html>
